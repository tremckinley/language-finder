name: Discover Published Languages

on:
  workflow_dispatch:
    inputs:
      domains:
        description: "Domains to analyze. Use commas, spaces, or new lines. Example: example.org, nature.org"
        required: true
        type: string
      output_name:
        description: "Optional artifact name"
        required: false
        default: "language-discovery-results"
        type: string
  schedule:
    # Optional weekly scheduled run using input_examples/domains.csv.
    # Edit or remove this schedule as needed.
    - cron: "0 12 * * 1"

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.11"
  DEFAULT_OUTPUT_DIR: "output"

jobs:
  discover-languages:
    name: Run language discovery
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare domain input
        shell: bash
        run: |
          mkdir -p input_runtime
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            printf '%s\n' "${{ inputs.domains }}" \
              | tr ', ' '\n' \
              | sed '/^$/d' \
              | awk 'BEGIN {print "domain"} {print $1}' \
              > input_runtime/domains.csv
          else
            cp input_examples/domains.csv input_runtime/domains.csv
          fi
          echo "Domains queued for analysis:"
          cat input_runtime/domains.csv

      - name: Run language discovery engine
        run: |
          python main.py --input input_runtime/domains.csv --output-dir "${{ env.DEFAULT_OUTPUT_DIR }}"

      - name: Add run summary
        shell: bash
        run: |
          echo "# Language Discovery Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Primary analyst output: \`language_reports.csv\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -f "${{ env.DEFAULT_OUTPUT_DIR }}/language_reports.csv" ]; then
            echo "## CSV Preview" >> "$GITHUB_STEP_SUMMARY"
            echo '```csv' >> "$GITHUB_STEP_SUMMARY"
            head -n 20 "${{ env.DEFAULT_OUTPUT_DIR }}/language_reports.csv" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload results artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.output_name || 'language-discovery-results' }}
          path: |
            output/language_reports.csv
            output/language_reports.json
            output/discovery_results.csv
            output/discovery_results.json
          retention-days: 14

name: Discover Published Languages
on:
  workflow_dispatch:
    inputs:
      domains:
        description: "Domains to analyze. Use commas, spaces, or new lines."
        required: true
        type: string
permissions:
  contents: read
jobs:
  discover-languages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
      - run: python -m pip install --upgrade pip && pip install -r requirements.txt
      - name: Prepare domain input
        shell: bash
        run: |
          mkdir -p input_runtime
          printf '%s\n' "${{ inputs.domains }}" | tr ', ' '\n' | sed '/^$/d' | awk 'BEGIN {print "domain"} {print $1}' > input_runtime/domains.csv
      - run: python main.py --input input_runtime/domains.csv --output-dir output
      - uses: actions/upload-artifact@v4
        with:
          name: language-discovery-results
          path: output/*

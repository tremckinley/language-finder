name: Discover Published Languages - Self Service

on:
  workflow_dispatch:
    inputs:
      domains:
        description: "Paste domains. Commas, spaces, or new lines are accepted."
        required: true
        type: string

permissions:
  contents: write

env:
  PYTHON_VERSION: "3.11"
  OUTPUT_DIR: "output"
  RUNTIME_INPUT_DIR: "input_runtime"

jobs:
  discover-languages:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare domain input
        shell: bash
        run: |
          mkdir -p "${{ env.RUNTIME_INPUT_DIR }}"
          printf '%s\n' "${{ inputs.domains }}" \
            | tr ', ' '\n' \
            | sed '/^$/d' \
            | awk 'BEGIN {print "domain"} {print $1}' \
            > "${{ env.RUNTIME_INPUT_DIR }}/domains.csv"

      - name: Run language discovery with debug output
        run: |
          python main.py \
            --input "${{ env.RUNTIME_INPUT_DIR }}/domains.csv" \
            --output-dir "${{ env.OUTPUT_DIR }}" \
            --debug

      - name: Build summary.csv and summary.json
        run: |
          python tools/build_summary.py \
            --language-report-json "${{ env.OUTPUT_DIR }}/language_reports.json" \
            --summary-output "${{ env.OUTPUT_DIR }}/summary.csv" \
            --summary-json-output "${{ env.OUTPUT_DIR }}/summary.json" \
            --markdown-output "${{ env.OUTPUT_DIR }}/summary.md"

      - name: Publish latest results to GitHub Pages data folder
        shell: bash
        run: |
          mkdir -p docs/data
          cp "${{ env.OUTPUT_DIR }}/summary.json" docs/data/summary.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/summary.json
          git commit -m "Update latest language discovery results" || echo "No changes to commit"
          git push

      - name: Package results
        shell: bash
        run: |
          cd "${{ env.OUTPUT_DIR }}"
          zip -r results.zip .

      - name: Upload result package
        uses: actions/upload-artifact@v4
        with:
          name: language-discovery-results
          path: ${{ env.OUTPUT_DIR }}/results.zip
          retention-days: 14

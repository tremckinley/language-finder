<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Language Discovery</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <main class="shell">
    <section class="hero">
      <p class="eyebrow">Deterministic multilingual site scan</p>
      <h1>Language Discovery</h1>
      <p class="summary">Paste one or more domains. The tool checks sitemaps, hreflang, HTML language attributes, URL patterns, and bounded page evidence, then returns a simple language count.</p>
    </section>

    <section class="card">
      <label for="domains">Domains</label>
      <textarea id="domains" rows="8" spellcheck="false" placeholder="example.org&#10;nature.org&#10;natureunited.ca"></textarea>
      <div class="actions">
        <button id="analyzeButton">Analyze domains</button>
        <button id="downloadButton" class="secondary" disabled>Download CSV</button>
      </div>
      <p id="status" class="status">Ready.</p>
    </section>

    <section class="card results-card">
      <div class="section-title">
        <h2>Results</h2>
        <span id="resultCount" class="pill">0 domains</span>
      </div>
      <div id="results" class="results empty">No results yet.</div>
    </section>
  </main>
  <script src="/static/app.js"></script>
</body>
</html>
